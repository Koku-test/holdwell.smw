name: 站点健康巡检

on:
  schedule:
    # 每天 02:00 UTC = 10:00 北京时间
    - cron: '0 2 * * *'
  workflow_dispatch:     # 手动触发
  push:
    branches: [main]
    paths:
      - 'sites-config.json'

jobs:
  health-check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 运行站点健康巡检
        run: node scripts/site-health-check.js
        env:
          PAGESPEED_API_KEY: ${{ secrets.PAGESPEED_API_KEY }}

      - name: 提交更新数据
        run: |
          git config user.name "health-check-bot"
          git config user.email "bot@health-check.local"
          git add dashboard/data.json
          if git diff --cached --quiet; then
            echo "数据无变化，跳过提交"
          else
            git commit -m "📊 站点健康巡检: $(date '+%Y-%m-%d %H:%M')"
            git push
          fi
