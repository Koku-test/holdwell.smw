name: 站点健康巡检

on:
  schedule:
    # Phase 1: 每4天 02:00 UTC = 10:00 北京时间
    - cron: '0 2 */4 * *'
    # Phase 2: 每周日 02:00 UTC = 10:00 北京时间
    - cron: '0 2 * * 0'
  workflow_dispatch:
    inputs:
      mode:
        description: '运行模式'
        required: true
        type: choice
        options:
          - basic
          - browser
          - all
        default: 'basic'
      site:
        description: '站点名称/URL（留空=全部站点）'
        required: false
        type: string
        default: ''
  push:
    branches: [main]
    paths:
      - 'sites-config.json'

jobs:
  health-check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # 先判断模式，Phase 1 不需要浏览器
      - name: 判断运行模式
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            DAY_OF_WEEK=$(date +%u)
            if [ "$DAY_OF_WEEK" = "7" ]; then
              echo "mode=browser" >> $GITHUB_OUTPUT
            else
              echo "mode=basic" >> $GITHUB_OUTPUT
            fi
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          else
            echo "mode=basic" >> $GITHUB_OUTPUT
          fi

      # 安装 Chrome（仅 Phase 2 需要，自带缓存避免每次下载）
      - name: 安装 Chrome
        if: steps.mode.outputs.mode == 'browser' || steps.mode.outputs.mode == 'all'
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: 安装依赖
        run: npm ci

      - name: 运行站点健康巡检
        run: |
          if [ -n "${{ github.event.inputs.site }}" ]; then
            node scripts/site-health-check.js --${{ steps.mode.outputs.mode }} --site="${{ github.event.inputs.site }}"
          else
            node scripts/site-health-check.js --${{ steps.mode.outputs.mode }}
          fi
        env:
          PSI_API_KEY: ${{ secrets.PSI_API_KEY }}

      - name: 提交更新数据
        run: |
          git config user.name "health-check-bot"
          git config user.email "bot@health-check.local"
          git add dashboard/data.json
          if git diff --cached --quiet; then
            echo "数据无变化，跳过提交"
          else
            git commit -m "📊 站点健康巡检 (${{ steps.mode.outputs.mode }}): $(date '+%Y-%m-%d %H:%M')"
            git push
          fi