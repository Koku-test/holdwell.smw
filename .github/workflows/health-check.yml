name: 站点健康巡检

on:
  schedule:
    # Phase 1: 每4天 02:00 UTC = 10:00 北京时间
    - cron: '0 2 */4 * *'
    # Phase 2: 每周日 02:00 UTC = 10:00 北京时间
    - cron: '0 2 * * 0'
  workflow_dispatch:
    inputs:
      mode:
        description: '运行模式'
        required: true
        type: choice
        options:
          - basic
          - browser
          - all
        default: 'basic'
      site:
        description: '站点名称/URL（留空=全部站点）'
        required: false
        type: string
        default: ''
  push:
    branches: [main]
    paths:
      - 'sites-config.json'

jobs:
  health-check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 安装 Chromium（供 Lighthouse / Puppeteer 使用）
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser libnss3 libnspr4 libatk-bridge2.0-0 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxrandr2 libgbm1 libpango-1.0-0 libcairo2 libasound2t64

      - name: 安装依赖
        run: npm ci

      - name: 判断运行模式
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            DAY_OF_WEEK=$(date +%u)
            if [ "$DAY_OF_WEEK" = "7" ]; then
              echo "mode=browser" >> $GITHUB_OUTPUT
            else
              echo "mode=basic" >> $GITHUB_OUTPUT
            fi
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          else
            echo "mode=basic" >> $GITHUB_OUTPUT
          fi

      - name: 运行站点健康巡检
        run: |
          if [ -n "${{ github.event.inputs.site }}" ]; then
            node scripts/site-health-check.js --${{ steps.mode.outputs.mode }} --site="${{ github.event.inputs.site }}"
          else
            node scripts/site-health-check.js --${{ steps.mode.outputs.mode }}
          fi
        env:
          CHROME_PATH: /usr/bin/chromium-browser
          PSI_API_KEY: ${{ secrets.PSI_API_KEY }}

      - name: 提交更新数据
        run: |
          git config user.name "health-check-bot"
          git config user.email "bot@health-check.local"
          git add dashboard/data.json
          if git diff --cached --quiet; then
            echo "数据无变化，跳过提交"
          else
            git commit -m "📊 站点健康巡检 (${{ steps.mode.outputs.mode }}): $(date '+%Y-%m-%d %H:%M')"
            git push
          fi